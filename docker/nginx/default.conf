server {
    listen 80;
    server_name localhost;
    root /var/www/html/public; # Chemin correct vers Laravel dans ton conteneur

    index index.php index.html;
    charset utf-8;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM (Lien vers ton service "app" sur le port 9000)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Bloquer l'accès aux fichiers cachés
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Cache des assets statiques (Optionnel mais recommandé)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type "text/plain";
    }
}