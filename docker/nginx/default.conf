
server {
    listen 80;
    server_name _;

    root /app/public;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # Handle all requests through index.php (Laravel)

# Configuration Nginx pour Laravel (conteneur app)

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    index index.php index.html index.htm;

    charset utf-8;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;


    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }


    # PHP FPM configuration
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:8000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to .env and other sensitive files
    location ~ /\. {
        deny all;
    }

    # Static files caching (CSS, JS, images)

    # PHP-FPM (service "app" sur le port 9000)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Bloquer l'accès aux fichiers cachés (sauf .well-known pour certains outils)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Cache des assets statiques

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }


    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type "text/plain";
    }

}
